[build]
  publish = "."

# -------------------------------------------------------
# Security & caching headers
# -------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# -------------------------------------------------------
# Subdomain routing
#
# Add these DNS records at your registrar / Netlify DNS:
#   travel.bbsrlocal.in  CNAME  <your-netlify-site>.netlify.app
#   toys.bbsrlocal.in    CNAME  <your-toys-storefront>.vercel.app  (external)
#
# The redirect below handles travel.bbsrlocal.in → /travel/
# (Netlify evaluates Host header for subdomain rules)
# -------------------------------------------------------
[[redirects]]
  from   = "https://travel.bbsrlocal.in/*"
  to     = "/travel/:splat"
  status = 200
  force  = true

# www → apex
[[redirects]]
  from   = "https://www.bbsrlocal.in/*"
  to     = "https://bbsrlocal.in/:splat"
  status = 301
  force  = true

# Fallback — SPA-style 404 to homepage
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
